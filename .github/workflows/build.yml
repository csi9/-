name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21 # التعديل هنا ليتوافق مع طلب مشروعك
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Full Clean Install and Build
        run: |
          unzip -o final-apk-ready-project.zip
          cd final-apk-ready-project
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest --save-exact --force
          npm install --force --legacy-peer-deps
          npm run build
          npx cap add android || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/android/app/build/outputs/apk/release/*.apk"
