name: Build Alpha Range Final V20
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Final Force Build
        run: |
          unzip -o final-apk-ready-project.zip
          cd final-apk-ready-project
          
          # حقن نظام الكاشير (نسخة مستقرة)
          cat <<EOF > src/App.jsx
          import React, { useState } from 'react';
          export default function App() {
            const [sales, setSales] = useState([]);
            const [item, setItem] = useState('');
            const [price, setPrice] = useState('');
            const [show, setShow] = useState(false);
            const add = () => { if (item && price) { setSales([...sales, { item, price: parseFloat(price), id: Date.now() }]); setItem(''); setPrice(''); } };
            if (!show) return (
              <div style={{textAlign: 'center', padding: '50px', direction: 'rtl', background: '#0d1117', color: 'white', height: '100vh'}}>
                <h1>نادي الرماية - ألفا رينج</h1>
                <button onClick={() => setShow(true)} style={{padding: '15px 30px', fontSize: '20px', background: '#238636', color: 'white', border: 'none', borderRadius: '10px'}}>دخول للنظام</button>
              </div>
            );
            return (
              <div style={{padding: '20px', direction: 'rtl', background: '#0d1117', color: 'white', minHeight: '100vh'}}>
                <h2>كاشير ألفا رينج</h2>
                <input placeholder="المادة" value={item} onChange={e => setItem(e.target.value)} style={{width: '90%', padding: '10px', marginBottom: '10px'}} />
                <input placeholder="السعر" type="number" value={price} onChange={e => setPrice(e.target.value)} style={{width: '90%', padding: '10px', marginBottom: '10px'}} />
                <button onClick={add} style={{width: '95%', padding: '10px', background: '#238636', color: 'white'}}>إضافة</button>
                <div style={{marginTop: '20px'}}>
                  {sales.map(s => <div key={s.id} style={{padding: '10px', borderBottom: '1px solid #30363d'}}>{s.item}: {s.price} د.ع</div>)}
                  <h3>المجموع: {sales.reduce((a, b) => a + b.price, 0)} د.ع</h3>
                </div>
                <button onClick={() => setShow(false)} style={{marginTop: '20px', color: 'red'}}>خروج</button>
              </div>
            );
          }
          EOF
          
          # تثبيت إجباري متوافق مع نسخة Capacitor 6.0.0 المذكورة في ملفك
          npm install --legacy-peer-deps
          npm install @capacitor/android@6.0.0 --save-exact --legacy-peer-deps
          
          npm run build
          npx cap add android || true
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alpha-Range-V20
          path: "**/android/app/build/outputs/apk/debug/*.apk"
