name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Unzip and Install Dependencies
        run: |
          unzip -o final-apk-ready-project.zip
          cd final-apk-ready-project
          # تنظيف وتنصيب إجباري لتجنب تضارب النسخ
          npm install --force --legacy-peer-deps
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --force
          npm run build

      - name: Create and Build Android Platform
        run: |
          cd final-apk-ready-project
          # حذف المجلد القديم إذا وجد وإضافته من جديد
          rm -rf android
          npx cap add android
          npx cap copy
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/android/app/build/outputs/apk/release/*.apk"
