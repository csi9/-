name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Unzip and Install Dependencies
        run: |
          unzip -o final-apk-ready-project.zip
          # الدخول للمجلد اللي فكينا ضغطه
          cd final-apk-ready-project
          npm install
          # تنصيب الكاباسيتور بشكل صريح
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm run build

      - name: Create and Build Android Platform
        run: |
          cd final-apk-ready-project
          # إنشاء مجلد الاندرويد لأنه مفقود بملفك
          npx cap add android
          npx cap copy
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/android/app/build/outputs/apk/release/*.apk"
